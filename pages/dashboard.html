<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard - Tarefas</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <header class="glass-panel p-3 mb-4 d-flex flex-wrap justify-content-between align-items-center gap-3">
    <div class="d-flex align-items-center gap-2">
      <i data-lucide="shield-alert" class="text-accent" style="width: 28px; height: 28px;"></i>
      <h3 class="mb-0 me-3 fw-bold text-accent">CYBHOR DASHBOARD</h3>
    </div>
    <div class="d-flex align-items-center gap-2 ms-auto">
      <button id="btn-back" class="btn btn-cyber btn-cyber-purple py-1.5 px-3">
        <i data-lucide="arrow-left" class="align-middle me-1"></i> Voltar
      </button>
      <button id="btn-refresh" class="btn btn-cyber py-1.5 px-3">
        <i data-lucide="refresh-ccw" class="align-middle me-1"></i> Atualizar
      </button>
      <button id="btn-theme-toggle" class="btn btn-cyber btn-cyber-purple py-1.5 px-3" title="Alternar modo escuro" aria-label="Alternar modo escuro">
        <i data-lucide="moon" class="align-middle"></i>
      </button>
      <div class="user-avatar">DB</div>
    </div>

    <!-- Mobile Hamburger Button -->
    <button class="hamburger-btn" id="mobile-menu-btn" aria-label="Abrir menu" title="Abrir menu">
      <i data-lucide="menu" class="align-middle"></i>
    </button>
  </header>

  <!-- Mobile Drawer Menu -->
  <div class="drawer-overlay" id="drawer-overlay"></div>
  <div class="mobile-drawer" id="mobile-drawer">
    <div class="drawer-header">
      <h5 class="drawer-title">Menu</h5>
      <button class="drawer-close-btn" id="drawer-close-btn" aria-label="Fechar menu">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div class="drawer-section">
      <span class="drawer-section-title">Navegação</span>
      <button id="drawer-btn-back" class="drawer-btn">
        <i data-lucide="arrow-left"></i> Voltar
      </button>
      <button id="drawer-btn-refresh" class="drawer-btn">
        <i data-lucide="refresh-ccw"></i> Atualizar
      </button>
    </div>

    <div class="drawer-section">
      <span class="drawer-section-title">Configurações</span>
      <button id="drawer-btn-theme" class="drawer-btn">
        <i data-lucide="moon"></i> <span id="drawer-theme-text">Modo Escuro</span>
      </button>
    </div>
  </div>

  <main class="container-fluid mt-4">
    <div class="row g-3">
      <div class="col-lg-4">
        <div class="glass-panel p-3">
          <h6 class="mb-3">Resumo</h6>
          <ul class="list-unstyled mb-0">
            <li>Total de tarefas: <strong id="total-tasks">0</strong></li>
            <li>Concluídas (sucesso): <strong id="count-done">0</strong></li>
            <li>Falhas / Retrabalho: <strong id="count-failed">0</strong></li>
            <li>Pendentes/outros: <strong id="count-other">0</strong></li>
          </ul>
          <div class="mt-3">
            <canvas id="pieChart" height="200"></canvas>
          </div>
        </div>

        <div class="glass-panel p-3 mt-3">
          <h6 class="mb-3">Por integrante (Concluídas x Falhas)</h6>
          <canvas id="barChart" height="200"></canvas>
        </div>
      </div>

      <div class="col-lg-8">
        <div class="glass-panel p-3">
          <h6 class="mb-3">Últimas tarefas alteradas</h6>
          <div class="table-responsive">
            <table class="table table-sm table-dark" id="tasks-table">
              <thead>
                <tr>
                  <th>Título</th>
                  <th>Assignee</th>
                  <th>Etapa</th>
                  <th>Concluído em</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>

          <div class="d-flex justify-content-end gap-2 mt-3">
            <button id="btn-export-csv" class="btn btn-cyber">Exportar CSV</button>
            <button id="btn-clear-filters" class="btn btn-cyber btn-cyber-purple">Limpar</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="../assets/js/shared/mobile-menu.js"></script>
  <script type="module" src="../assets/js/pages/dashboard.js"></script>
</body>
</html>
